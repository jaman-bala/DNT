
secrets:
  postgres_password:
    external: true
  django_secret_key:
    external: true
  minio_access_key:
    external: true
  minio_secret_key:
    external: true



volumes:
  dnt_db_data:
  minio_data:
  redis_data:

networks:
  dnt:
    driver: overlay
    attachable: true

services:
  redis:
    image: redis:7-alpine
    networks:
      - dnt
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    environment:
      MINIO_ROOT_USER_FILE: /run/secrets/minio_access_key
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_secret_key
    secrets:
      - minio_access_key
      - minio_secret_key
    volumes:
      - minio_data:/data
    networks:
      - dnt
    command: server /data --console-address ":9001"
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD-SHELL", "(curl -f http://localhost:9000/minio/health/live) || (mc ready local)"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dnt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - dnt_db_data:/var/lib/postgresql/data
    networks:
      - dnt
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dnt"]
      interval: 10s
      timeout: 5s
      retries: 10

  migrations_and_static:
    image: ${IMAGE_TAG}
    env_file:
      - ./.env.dev
    environment:
      DJANGO_ENV: dev
      DEBUG: "1"
      REDIS_URL: redis://redis:6379/1
    secrets:
      - source: postgres_password
        target: postgres_password
      - source: django_secret_key
        target: secret_key
      - source: minio_access_key
        target: aws_s3_access_key_id
      - source: minio_secret_key
        target: aws_s3_secret_access_key
    networks:
      - dnt
    command: >
      sh -lc "python wait_for_db.py && python manage.py migrate --noinput &&
              python manage.py collectstatic --noinput"
    deploy:
      replicas: 1
      restart_policy:
        condition: none

  backend:
    image: ${IMAGE_TAG}
    env_file:
      - ./.env.dev
    environment:
      DJANGO_ENV: dev
      DEBUG: "1"
      REDIS_URL: redis://redis:6379/1
    secrets:
      - source: postgres_password
        target: postgres_password
      - source: django_secret_key
        target: secret_key
      - source: minio_access_key
        target: aws_s3_access_key_id
      - source: minio_secret_key
        target: aws_s3_secret_access_key
    networks:
      - dnt
    ports:
      - "8044:8000"
    command: >
      sh -lc "python wait_for_db.py && gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        order: start-first
    healthcheck:
      test: [ "CMD", "curl", "-fsS", "http://localhost:8000/health/" ]
      interval: 20s
      timeout: 5s
      retries: 10
