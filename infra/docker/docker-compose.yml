  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "6344:6379"
    networks:
      - backend-network
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

volumes:
  postgres_data:
  media:
  static:
  minio-data:
#  rabbitmq_data:

networks:
  backend-network:
    driver: bridge